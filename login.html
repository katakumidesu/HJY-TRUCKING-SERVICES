<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJY Trucking Services</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/48201a6c5a.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="images/HJY LOGO 2 1.png" alt="HJY Trucking Services Logo" class="logo">
        </div>
        <div class="main-content">
            <div class="form-wrapper">
                
                
                <div class="login-form">
                    <div class="tabs">
                        
                        <button class="tab" id="login_account">
                            <i class="fa-solid fa-user-check"></i> <span>Login Account</span>
                        </button>
                    </div>
                    
                    <form class="form">
                        <div class="input-box">
                            <h6>Username</h6>
                            <input type="text" id="username" name="username" placeholder="Enter Username..." required>
                            <i class="fa-regular fa-user"></i>
                        </div>
                        <div class="input-box">
                            <h6>Password</h6>
                            <input type="password" id="password" name="password" placeholder="Enter Password..." required>
                            <i class="fa-solid fa-key" style="left: 12px; right: auto;"></i>
                            <img src="images/hide.png" id="eyeicon" class="eyeicon">
                        </div>
                        <button type="submit" class="submit_btn">Submit</button>
                    </form>
                </div>
                <div class="truck-image">
                    <img src="images/truck kun 1.png" >
                </div>
            </div>
        </div>
    </div>

    <script>
        const eyeicon = document.getElementById("eyeicon");
        const password = document.getElementById("password");

        eyeicon.onclick = function() {
            if(password.type == "password") {
                password.type = "text";
                eyeicon.src="images/view.png";

                
            } else {
                password.type = "password";
                eyeicon.src="images/hide.png";
                
            }
        }
        
          const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });


    </script>
</body>
</html>
